name: Copilot Setup Steps

# This workflow sets up the environment for GitHub Copilot coding agent.
# It runs before the agent starts work — giving it a functional environment
# with all dependencies installed and a verified build.
#
# Without this file, the coding agent runs blind:
# it won't know how to install dependencies, run tests, or build the project.

on:
  workflow_call:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python / Backend ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Verify backend starts
        working-directory: backend
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/health || exit 1
          kill %1

      # ── Node / Frontend ───────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend builds
        working-directory: frontend
        run: npm run build

      - name: Validate baseline is clean
        run: |
          cd backend && ruff check . && pytest tests/ -v
          cd frontend && npm run typecheck && npm run lint
